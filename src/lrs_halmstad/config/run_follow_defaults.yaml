/**:
  ros__parameters:
    camera_x_offset_m: 0.0
    camera_y_offset_m: 0.0
    camera_z_offset_m: 0.27
    camera_mount_pitch_deg: 45.0
    camera_yaw_offset_deg: 0.0
    camera_pan_sign: 1.0
    leader_look_target_x_m: 0.0
    leader_look_target_y_m: 0.0

follow_uav:
  ros__parameters:
    event_topic: /coord/events
    publish_events: false

    d_target: 8.0
    xy_min: 2.0
    z_min: 5.0
    xy_anchor_max: 10.0

    seed_uav_cmd_on_start: true
    uav_start_x: -7.0
    uav_start_y: 0.0
    uav_start_z: 7.0
    uav_start_yaw_deg: 0.0
    follow_yaw: true
    leader_status_topic: /coord/leader_estimate_status

    min_cmd_period_s: 0.05
    pose_timeout_s: 3.0
    tick_hz: 20.0

    follow_speed_mps: 3.0
    follow_speed_gain: 1.2
    uav_xy_command_mode: direct
    uav_xy_command_step_scale: 0.6
    follow_z_speed_mps: 3.0
    follow_z_speed_gain: 1.0
    search_z_speed_scale: 0.25
    search_z_gain_scale: 0.05
    search_min_motion_scale: 0.05
    search_delay_s: 1.5
    follow_yaw_rate_rad_s: 0.6
    follow_yaw_rate_gain: 1.2
    follow_yaw_accel_rad_s2: 6.0
    publish_debug_topics: true
    publish_pose_cmd_topics: true
    publish_metrics: false
    metrics_prefix: /coord

    quality_conf_good: 0.7
    quality_conf_min: 0.4
    quality_hold_step_scale: 0.08
    quality_latency_ref_ms: 300.0
    quality_min_motion_scale: 0.25
    quality_scale_enable: true

    state_debounce_ticks: 3
    state_machine_enable: true

    leader_actual_heading_enable: false
    leader_actual_heading_topic: /a201_0000/amcl_pose_odom
    estimate_heading_from_motion_enable: true
    estimate_heading_max_dt_s: 2.0
    estimate_heading_min_speed_mps: 0.5

    traj_enable: true
    traj_max_accel_mps2: 2.5
    traj_max_speed_mps: 5.0
    traj_pos_gain: 1.0
    traj_rel_frame_enable: true
    traj_reset_on_yaw_jump_rad: 0.8

camera_tracker:
  ros__parameters:
    camera_look_target_z_m: 0.0
    default_pan_deg: 0.0
    default_tilt_deg: -45.0
    pan_enable: true
    tilt_enable: true
    image_center_correction_enable: false
    image_center_correction_timeout_s: 0.25
    pan_image_center_gain: 0.15
    pan_image_center_max_deg: 1.0
    tilt_image_center_gain: 0.2
    tilt_image_center_max_deg: 4.0
    publish_debug_topics: true
    pose_timeout_s: 2.0
    actual_pose_reacquire_enable: false
    trackable_hold_timeout_s: 8.0
    tick_hz: 10.0
    gimbal_override_hold_s: 0.0

uav_simulator:
  ros__parameters:
    gimbal_pitch_min_rad: -1.5708
    gimbal_pitch_max_rad: 0.7854
    pan_rate_deg_s: 30.0
    tilt_rate_deg_s: 22.5
    startup_set_pose_grace_s: 3.0
    set_pose_failure_backoff_s: 2.0

leader_detector:
  ros__parameters:
    event_topic: /coord/events
    out_topic: /coord/leader_detection
    status_topic: /coord/leader_detection_status
    publish_events: true

    device: 'cpu'
    imgsz: 640
    predict_hz: 60.0

    conf_threshold: 0.15
    iou_threshold: 0.5
    target_class_id: -1
    target_class_name: ""

    bbox_continuity_class_bonus: 0.0
    bbox_continuity_max_px: 180.0
    bbox_continuity_weight: 0.15

leader_tracker:
  ros__parameters:
    event_topic: /coord/events
    out_topic: /coord/leader_detection
    status_topic: /coord/leader_detection_status
    publish_events: true

    device: 'cpu'
    imgsz: 640
    predict_hz: 60.0
    tracker_config: bytetrack.yaml

    conf_threshold: 0.15
    iou_threshold: 0.5
    target_class_id: -1
    target_class_name: ""

leader_estimator:
  ros__parameters:
    estimate_error_topic: /coord/leader_estimate_error
    event_topic: /coord/events
    external_detection_timeout_s: 1.0
    external_detection_topic: /coord/leader_detection
    external_detection_status_topic: /coord/leader_detection_status
    leader_actual_pose_enable: true
    leader_actual_pose_timeout_s: 2.0
    leader_actual_pose_topic: /a201_0000/amcl_pose_odom
    out_topic: /coord/leader_estimate
    publish_debug_image: true
    publish_events: true
    publish_fault_status: true
    publish_status: true
    status_topic: /coord/leader_estimate_status
    fault_status_topic: /coord/leader_estimate_fault
    debug_image_topic: /coord/leader_debug_image

    cam_pitch_offset_deg: 0.0
    cam_yaw_offset_deg: 0.0
    cam_roll_offset_deg: 0.0
    cam_x_offset_m: 0.0
    cam_y_offset_m: 0.0
    cam_z_offset_m: 0.27
    image_timeout_s: 2.0
    uav_pose_timeout_s: 2.0

    est_hz: 20.0

    range_mode: auto
    d_target: 8.0
    depth_max_m: 20.0
    depth_min_m: 1.0
    depth_scale: 0.001
    depth_timeout_s: 0.5
    depth_patch_min_valid_px: 10
    depth_percentile: 6.0
    depth_max_estimate_jump_m: 5.0
    target_ground_z_m: 0.0
    radio_range_topic: /omnet/radio_distance
    radio_range_timeout_s: 0.5

ugv_nav2_driver:
  ros__parameters:
    nav2_required_lifecycle_nodes: [map_server, amcl, controller_server, bt_navigator]
    continue_on_goal_failure: true
    path_topic: planned_path
    pose_topic: amcl_pose
    pose_topic_type: pose_with_covariance

    initial_pose_covariance_xy: 0.25
    initial_pose_covariance_yaw: 0.068
    initial_pose_frame_id: map
    initial_pose_publish_hz: 1.0
    initial_pose_skip_wait_s: 0.5
    initial_pose_timeout_s: 15.0
    initial_pose_topic: initialpose
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_yaw_deg: 0.0
    set_initial_pose_enable: true

    goal_action_name: navigate_to_pose
    goal_frame_id: map
    goal_reject_retry_count: 20
    goal_reject_retry_delay_s: 0.5
    goal_result_timeout_s: 600.0
    goal_sequence_csv: ""
    goal_sequence_file: ""
    goal_sequence_random_reverse: true
    goal_sequence_randomize: true
    goal_sequence_relative_to_current_pose: true
    goal_sequence_seed: -1
    goal_server_timeout_s: 20.0
    goal_start_delay_s: 0.5
    min_goal_xy_delta_m: 0.05
    min_goal_yaw_delta_deg: 2.0
    pause_after_goal_s: 0.0

    cycles: 2
    forward_speed: 0.75
    forward_time_s: 0.90
    motion_profile: route
    pause_every_n: 0
    pause_time_s: 0.0
    turn_pattern: alternate
    turn_speed: 0.55
    turn_time_s: 0.65
    variation_amplitude: 0.10
    variation_enable: true

    pose_stale_timeout_s: 2.0
    pose_timeout_s: 10.0
    start_delay_s: 0.0

selected_target_filter:
  ros__parameters:
    strong_confidence_threshold: 0.65
    weak_confidence_threshold: 0.35
    min_confidence_threshold: 0.08
    track_switch_min_confidence: 0.60
    prediction_enable: true
    prediction_max_gap_s: 0.20

visual_target_estimator:
  ros__parameters:
    range_signal_mode: "auto"
    reference_range_m: 8.0
    reference_area_norm: 0.009
    position_alpha_projected: 0.65
    position_alpha_area: 0.45
    velocity_beta_projected: 0.35
    velocity_beta_area: 0.18

visual_follow_controller:
  ros__parameters:
    yaw_gain: 2.0
    forward_range_gain: 0.75
    forward_area_gain: 6.0
    yaw_rate_max_rad_s: 1.0
    forward_speed_max_mps: 2.0
    loss_hold_timeout_s: 0.35

follow_point_generator:
  ros__parameters:
    prefer_target_pose_position: false
    prefer_target_pose_heading: false
    follow_distance_m: 8.0
    follow_altitude_m: 7.0
    lateral_offset_m: 0.0
    lookahead_horizon_s: 0.15
    heading_dir_alpha: 0.8
    point_alpha: 0.35
    max_follow_point_jump_m: 1.0
    require_motion_to_start: true
    min_target_speed_mps: 0.10
    target_velocity_alpha: 0.5
    max_target_meas_speed_mps: 2.0

follow_point_planner:
  ros__parameters:
    xy_alpha: 0.30
    z_alpha: 0.45
    yaw_alpha: 0.20
    max_planned_step_m: 0.25
    max_planned_z_step_m: 0.40
    max_planned_yaw_step_rad: 0.02
    hold_timeout_s: 0.5
    stale_fp_thresh_m: 0.05
    stale_alpha_scale: 0.3

visual_actuation_bridge:
  ros__parameters:
    input_mode: "auto"
    forward_scale: 1.0
    yaw_scale: 0.5
    max_xy_step_m: 0.12
    max_yaw_step_rad: 0.06
    use_current_altitude: false
    publish_pose_cmd_mirror: true
    yaw_cmd_sign: 1.0
